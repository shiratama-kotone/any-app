<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Perfect JST Clock - Distortion Free</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'M PLUS 1p', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        #time { font-size: 10rem; font-variant-numeric: tabular-nums; line-height: 1; }
        button { 
            padding: 20px 60px; font-size: 1.5rem; cursor: pointer; 
            background: #fff; color: #000; border: none; font-weight: bold; font-family: 'M PLUS 1p', sans-serif;
        }
    </style>
</head>
<body>

    <div id="time">00:00:00</div>
    <br>
    <button id="startBtn">ACCESS (SOUND ON)</button>

    <script>
        let audioCtx = null;
        let masterGain = null; // 全体ボリューム
        let masterLimiter = null; // 音割れ防止
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        let lastScheduledTime = -1;

        const workerCode = `
            setInterval(() => { self.postMessage('tick'); }, 10);
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        function playClearTone(freq, durationMs, volume, startTime, isLinearDecay = false) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            const durationSec = durationMs / 1000;
            
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(volume, startTime + 0.002);
            
            if (isLinearDecay) {
                gain.gain.linearRampToValueAtTime(0, startTime + durationSec);
            } else {
                gain.gain.setValueAtTime(volume, startTime + durationSec - 0.002);
                gain.gain.linearRampToValueAtTime(0, startTime + durationSec);
            }
            
            osc.connect(gain);
            // 個別のGainをマスターリミッターへ接続
            gain.connect(masterLimiter);
            osc.start(startTime);
            osc.stop(startTime + durationSec);
        }

        function startSilentHeartbeat() {
            const buffer = audioCtx.createBuffer(1, 1, 22050);
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.00001; 
            source.connect(gain);
            gain.connect(masterLimiter);
            source.start();
        }

        function getJST() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 9));
        }

        worker.onmessage = function() {
            const nowTime = Date.now();
            const jstNow = getJST();
            timeDisplay.textContent = jstNow.toTimeString().split(' ')[0];

            if (!audioCtx) return;

            // 0.2秒先までのジャスト秒を狙う
            const nextSyncTime = Math.floor(nowTime / 1000) * 1000 + 1000;
            
            if (nextSyncTime !== lastScheduledTime && (nextSyncTime - nowTime) < 200) {
                const s = new Date(nextSyncTime).getSeconds();
                const delayUntilNextSec = (nextSyncTime - nowTime) / 1000;
                const startTime = audioCtx.currentTime + delayUntilNextSec;

                // 各音のバランスを調整（合計が1.0を超えにくくする）
                playClearTone(2000, 20, 0.12, startTime);
                if (s % 10 === 0) playClearTone(1000, 2000, 0.15, startTime, true);
                if ((s >= 27 && s <= 29) || (s >= 57 && s <= 59)) playClearTone(500, 200, 0.12, startTime);

                lastScheduledTime = nextSyncTime;
            }
        };

        startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. マスターボリューム調整
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.8, audioCtx.currentTime);

            // 2. 音割れ防止用の強力なリミッター
            masterLimiter = audioCtx.createDynamicsCompressor();
            masterLimiter.threshold.setValueAtTime(-0.5, audioCtx.currentTime); // 限界寸前で抑える
            masterLimiter.knee.setValueAtTime(0, audioCtx.currentTime);       // パキッと抑える
            masterLimiter.ratio.setValueAtTime(20, audioCtx.currentTime);     // 強く圧縮
            masterLimiter.attack.setValueAtTime(0.001, audioCtx.currentTime); // 即座に反応
            masterLimiter.release.setValueAtTime(0.1, audioCtx.currentTime);

            // 接続: 各音 -> Limiter -> MasterGain -> Speaker
            masterLimiter.connect(masterGain);
            masterGain.connect(audioCtx.destination);
            
            startSilentHeartbeat();
            startBtn.style.display = 'none';
        });
    </script>
</body>
</html>
