<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OZ Precision Monitor - Left Stop Marquee</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'M PLUS 1p', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 速報ヘッダー */
        #news-header {
            width: 90%;
            max-width: 1200px;
            height: 65px;
            position: absolute;
            top: 15%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .border-active {
            border-top: 4px solid #fff;
            border-bottom: 4px solid #fff;
        }

        /* スクロールする中身 */
        #marquee-content {
            position: absolute;
            white-space: nowrap;
            color: #ffff00;
            font-size: 1.8rem;
            font-weight: bold;
            left: 0;
            will-change: transform;
        }

        /* 時計ユニット（中央固定） */
        .clock-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #time { font-size: 10rem; font-variant-numeric: tabular-nums; line-height: 1; }
        #ms { font-size: 5rem; font-variant-numeric: tabular-nums; line-height: 1; margin-left: 15px; color: rgba(255, 255, 255, 0.7); }

        button { 
            position: absolute; bottom: 10%;
            padding: 15px 50px; font-size: 1.2rem; cursor: pointer; 
            background: #fff; color: #000; border: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="news-header">
        <div id="marquee-content"></div>
    </div>

    <div class="clock-container">
        <div id="time">00:00:00</div>
        <div id="ms">.000</div>
    </div>
    
    <button id="startBtn">ACCESS (SOUND ON)</button>

    <script>
        // --- 設定エリア ---
        const rawText = ``; 
        
        const scrollSpeed = 3.0; // 流れる速度
        const waitTime = 2000;   // 左端での停止時間(ms)

        // --- スクロールロジック ---
        const header = document.getElementById('news-header');
        const content = document.getElementById('marquee-content');
        const lines = rawText.split('\n').filter(line => line.trim() !== "");
        
        let currentLineIdx = 0;
        let posX = 0;
        let state = "ENTERING"; // ENTERING(右から左端へ), WAITING(左端停止), LEAVING(左へ消える)

        function updateMarquee() {
            if (lines.length === 0) return;
            header.classList.add('border-active');

            if (state === "ENTERING") {
                posX -= scrollSpeed * 2; // 入ってくるときは少し速めに
                if (posX <= 0) {
                    posX = 0;
                    state = "WAITING";
                    setTimeout(() => { state = "LEAVING"; }, waitTime);
                }
            } else if (state === "LEAVING") {
                posX -= scrollSpeed;
                if (posX < -content.offsetWidth) {
                    currentLineIdx = (currentLineIdx + 1) % lines.length;
                    startNextLine();
                }
            }

            content.style.transform = `translateX(${posX}px)`;
            requestAnimationFrame(updateMarquee);
        }

        function startNextLine() {
            content.textContent = lines[currentLineIdx];
            posX = header.offsetWidth; // 枠の右端の外からスタート
            state = "ENTERING";
        }

        // 初期化
        if (lines.length > 0) {
            startNextLine();
            requestAnimationFrame(updateMarquee);
        }

        // --- オーディオ・時計ロジック (維持) ---
        let audioCtx = null;
        let masterLimiter = null;
        const timeDisplay = document.getElementById('time');
        const msDisplay = document.getElementById('ms');
        const startBtn = document.getElementById('startBtn');
        let lastScheduledTime = -1;

        const workerCode = `setInterval(() => { self.postMessage('tick'); }, 10);`;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        function playClearTone(freq, durationMs, volume, startTime, isLinearDecay = false) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            const durationSec = durationMs / 1000;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(volume, startTime + 0.002);
            if (isLinearDecay) {
                gain.gain.linearRampToValueAtTime(0, startTime + durationSec);
            } else {
                gain.gain.setValueAtTime(volume, startTime + durationSec - 0.002);
                gain.gain.linearRampToValueAtTime(0, startTime + durationSec);
            }
            osc.connect(gain);
            gain.connect(masterLimiter);
            osc.start(startTime);
            osc.stop(startTime + durationSec);
        }

        function getJST() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 9));
        }

        worker.onmessage = function() {
            const nowTime = Date.now();
            const jstNow = getJST();
            timeDisplay.textContent = jstNow.toTimeString().split(' ')[0];
            msDisplay.textContent = "." + String(jstNow.getMilliseconds()).padStart(3, '0');

            if (!audioCtx) return;

            const nextSyncTime = Math.floor(nowTime / 1000) * 1000 + 1000;
            if (nextSyncTime !== lastScheduledTime && (nextSyncTime - nowTime) < 200) {
                const s = new Date(nextSyncTime).getSeconds();
                const delayUntilNextSec = (nextSyncTime - nowTime) / 1000;
                const startTime = audioCtx.currentTime + delayUntilNextSec;

                playClearTone(2000, 20, 0.12, startTime);
                if (s % 10 === 0) playClearTone(1000, 2000, 0.15, startTime, true);
                if ((s >= 27 && s <= 29) || (s >= 57 && s <= 59)) playClearTone(500, 200, 0.12, startTime);

                lastScheduledTime = nextSyncTime;
            }
        };

        startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterLimiter = audioCtx.createDynamicsCompressor();
            masterLimiter.connect(audioCtx.destination);
            startBtn.style.display = 'none';
        });
    </script>
</body>
</html>
