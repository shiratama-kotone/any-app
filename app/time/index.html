<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>とけい</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'M PLUS 1p', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        #time { font-size: 10rem; font-variant-numeric: tabular-nums; line-height: 1; }
        button { 
            padding: 20px 60px; font-size: 1.5rem; cursor: pointer; 
            background: #fff; color: #000; border: none; font-weight: bold; font-family: 'M PLUS 1p', sans-serif;
        }
    </style>
</head>
<body>

    <div id="time">00:00:00</div>
    <br>
    <button id="startBtn">ACCESS (SOUND ON)</button>

    <script>
        let audioCtx = null;
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        let lastScheduledSecond = -1;

        // タイマー精度を上げるためにWorkerの間隔を短縮
        const workerCode = `
            setInterval(() => { self.postMessage('tick'); }, 25);
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        function playClearTone(freq, durationMs, volume, targetTime, isLinearDecay = false) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.value = freq;
            
            const durationSec = durationMs / 1000;
            
            // 未来の「targetTime」を基準にエンベロープを組む
            gain.gain.setValueAtTime(0, targetTime);
            gain.gain.linearRampToValueAtTime(volume, targetTime + 0.002);
            
            if (isLinearDecay) {
                gain.gain.linearRampToValueAtTime(0, targetTime + durationSec);
            } else {
                // 響きを出すための指数減衰
                gain.gain.exponentialRampToValueAtTime(0.001, targetTime + durationSec);
            }
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(targetTime);
            osc.stop(targetTime + durationSec);
        }

        function getJST() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 9));
        }

        worker.onmessage = function() {
            if (!audioCtx) {
                // 画面表示だけは更新
                const jstNow = getJST();
                timeDisplay.textContent = jstNow.toTimeString().split(' ')[0];
                return;
            }

            const jstNow = getJST();
            const currentSec = jstNow.getSeconds();
            timeDisplay.textContent = jstNow.toTimeString().split(' ')[0];

            // 0.1秒先の「次の秒」を予約対象にする
            const lookAheadTime = new Date(jstNow.getTime() + 100); 
            const scheduledSec = lookAheadTime.getSeconds();

            // まだ予約していない秒であれば予約を実行
            if (scheduledSec !== lastScheduledSecond) {
                // オーディオ上の「今」から計算した「次のジャスト秒」の絶対時刻
                const msUntilNextSec = 1000 - lookAheadTime.getMilliseconds();
                const targetAudioTime = audioCtx.currentTime + (msUntilNextSec / 1000);

                // 1秒毎
                playClearTone(2000, 20, 0.15, targetAudioTime);

                // 10秒毎
                if (scheduledSec % 10 === 0) {
                    playClearTone(1000, 2000, 0.2, targetAudioTime, true);
                }

                // 予告音
                if ((scheduledSec >= 27 && scheduledSec <= 29) || (scheduledSec >= 57 && scheduledSec <= 59)) {
                    playClearTone(500, 200, 0.15, targetAudioTime);
                }

                lastScheduledSecond = scheduledSec;
            }
        };

        startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBtn.style.display = 'none';
        });
    </script>
</body>
</html>
