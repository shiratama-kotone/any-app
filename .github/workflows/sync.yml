name: sync cookieclicker

on:
  schedule:
    - cron: "0 * * * *" # 1時間ごと
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 自分のリポジトリ取得
        uses: actions/checkout@v4

      - name: コピー元を取得（gh-pages）
        run: |
          git clone --depth=1 --branch gh-pages https://github.com/ozh/cookieclicker.git temp
          rm -rf temp/.git

      - name: 同期（中身だけ）
        run: |
          mkdir -p game/cookie-clicker
          rsync -av --delete temp/ game/cookie-clicker/

      - name: push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto sync" || echo "変更なし"
          git push
