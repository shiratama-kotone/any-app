<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TJA Previewer - Ultimate Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 950px; margin: 0 auto; background: #2d2d2d; padding: 20px; border-radius: 12px; }
        #tja-editor { width: 100%; height: 80px; background: #000; color: #0f0; border: 1px solid #555; font-family: monospace; padding: 10px; margin-bottom: 10px; }
        .controls { display: flex; align-items: center; gap: 15px; background: #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        button { background: #00b0ff; color: #fff; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .game-screen { width: 100%; height: 160px; background: #000; border: 4px solid #444; border-radius: 10px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        .speed-ctrl { display: flex; align-items: center; gap: 5px; background: #444; padding: 5px 10px; border-radius: 4px; }
        #status-bar { font-size: 12px; color: #0f0; margin-top: 8px; font-family: monospace; background: #000; padding: 8px; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="tja-editor" placeholder="TJA貼り付け..."></textarea>
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <button onclick="document.getElementById('f-combined').click()">📄 ZIP / TJA 読込</button>
        <button onclick="document.getElementById('f-audio-only').click()">🎵 音声読込</button>
        <button id="apply-btn" style="background:#4caf50; flex:1;">反映 (APPLY)</button>
        <input type="file" id="f-combined" accept=".tja,.zip" style="display:none">
        <input type="file" id="f-audio-only" accept="audio/*" style="display:none">
    </div>
    <div class="controls">
        <button id="play-btn">▶ 再生 / 停止</button>
        <input type="range" id="seek-bar" value="0" step="0.01">
        <span id="time-display">0.00</span>
        <div class="speed-ctrl">
            速度: <input type="number" id="speed-num" value="1.0" step="0.01" min="0.1" max="5.0" style="width:50px;">
        </div>
        <select id="course-select"></select>
        <label><input type="checkbox" id="auto-play" checked> AUTO</label>
    </div>
    <div class="game-screen"><canvas id="game-canvas"></canvas></div>
    <div id="status-bar">READY</div>
</div>

<script>
const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
const notesImg = new Image();
notesImg.src = "https://raw.githubusercontent.com/shiratama-kotone/any-app/main/assets/taiko/notes.png";

const SPRITES = {
    1: { x: 202, w: 78 }, 2: { x: 360, w: 80 }, 3: { x: 495, w: 128 }, 4: { x: 655, w: 128 },
    5: { x: 838, w: 82 }, 55: { x: 960, w: 160 }, 6: { x: 1295, w: 125 }, 66: { x: 1440, w: 160 },
    7: { x: 1798, w: 212 }, 8: { x: 1145, w: 75 }, 9: { x: 2095, w: 130 }, judge: { x: 15, w: 130 }
};

const TARGET_X = 150, Y_CENTER = 75, PX_PER_SEC = 400, SCALE = 0.5;

// Audioシステム
const audio = new Audio();
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let se = {}, playbackRate = 1.0;
let courses = {}, currentCourse = null, notes = [], bars = [], effects = [];

// 音楽をAudioContextに接続
const source = audioCtx.createMediaElementSource(audio);
source.connect(audioCtx.destination);

function setupCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
}
setupCanvas();

async function initSE() {
    const base = "https://raw.githubusercontent.com/shiratama-kotone/any-app/main/assets/taiko/";
    const names = ['dong', 'ka', 'balloon'];
    for(let n of names) {
        const r = await fetch(base + (n==='dong'?'dong.wav':n==='ka'?'ka.wav':'balloon.wav'));
        se[n] = await audioCtx.decodeAudioData(await r.arrayBuffer());
    }
}
initSE();

function playSE(type) {
    if (!se[type]) return;
    const s = audioCtx.createBufferSource();
    s.buffer = se[type];
    s.playbackRate.value = 1.0; // SEのピッチは固定
    s.connect(audioCtx.destination);
    s.start(0);
}

function parseTJA(text) {
    courses = {}; let gBpm = 120, gOff = 0;
    const lines = text.split('\n').map(l => l.split('//')[0].trim());
    lines.forEach(l => {
        if(l.toUpperCase().startsWith('BPM:')) gBpm = parseFloat(l.split(':')[1]) || 120;
        if(l.toUpperCase().startsWith('OFFSET:')) gOff = parseFloat(l.split(':')[1]) || 0;
    });
    let cur = 'ONI';
    lines.forEach(l => {
        if(l.toUpperCase().startsWith('COURSE:')) cur = l.split(':')[1].trim().toUpperCase();
        if(!courses[cur]) courses[cur] = { lines: [], bpm: gBpm, offset: gOff };
        courses[cur].lines.push(l);
    });
    document.getElementById('course-select').innerHTML = Object.keys(courses).map(k => `<option>${k}</option>`).join('');
    loadCourse(Object.keys(courses)[0]);
}

function loadCourse(label) {
    const c = courses[label]; if(!c) return;
    currentCourse = c; notes = []; bars = []; effects = [];
    let bpm = c.bpm, scroll = 1.0, measure = 1.0, curTime = 0, started = false, balloons = [], rollStack = [];
    c.lines.forEach(l => {
        const u = l.toUpperCase();
        if(u.startsWith('#BALLOON')) balloons = l.split(':')[1].split(',').map(v => parseInt(v)||5);
        if(u === '#START') { started = true; return; }
        if(u === '#END') { started = false; return; }
        if(!started) return;
        if(l.startsWith('#')) {
            const p = u.split(' ');
            if(p[0]==='#BPMCHANGE') bpm = parseFloat(p[1]);
            if(p[0]==='#SCROLL') scroll = parseFloat(p[1]);
            if(p[0]==='#MEASURE') { const m = p[1].split('/'); if(m[1]) measure = parseFloat(m[0])/parseFloat(m[1]); }
        } else if(l.includes(',') || /^[0-9]+$/.test(l)) {
            const ss = l.split(',');
            ss.forEach((s, idx) => {
                const data = s.replace(/\s+/g, '');
                const mDur = (60/bpm)*4*measure;
                for(let i=0; i<data.length; i++) {
                    const type = parseInt(data[i]);
                    const time = curTime + (mDur * (i/data.length));
                    if(type >= 1 && type <= 9 && type !== 8) {
                        const n = { time, type, scroll, hit: false, fin: false, endTime: time, req: [7,9].includes(type)?(balloons.shift()||5):0, curH: 0, lastA: time };
                        notes.push(n); if([5,6,7,9].includes(type)) rollStack.push(n);
                    } else if(type === 8) { rollStack.forEach(r => r.endTime = time); rollStack = []; }
                }
                if(idx < ss.length - 1) { curTime += mDur; bars.push({ time: curTime, scroll }); }
            });
        }
    });
}

function update() {
    const dprW = canvas.width / (window.devicePixelRatio || 1);
    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 0, dprW, 160);
    
    // 時間の取得とOFFSET補正
    const currentTime = audio.currentTime;
    const now = currentTime + (currentCourse ? currentCourse.offset : 0);
    
    document.getElementById('time-display').textContent = currentTime.toFixed(2);
    document.getElementById('seek-bar').value = currentTime;

    ctx.fillStyle = "#000"; ctx.fillRect(0, Y_CENTER-35, dprW, 70);
    bars.forEach(b => {
        const x = TARGET_X + (b.time - now) * (PX_PER_SEC * b.scroll);
        if(x > 0 && x < dprW) { ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x, Y_CENTER-35); ctx.lineTo(x, Y_CENTER+35); ctx.stroke(); }
    });

    const sj = SPRITES.judge;
    ctx.drawImage(notesImg, sj.x, 0, sj.w, 150, TARGET_X - (sj.w*SCALE)/2, Y_CENTER - 75*SCALE, sj.w*SCALE, 150*SCALE);

    const isAuto = document.getElementById('auto-play').checked;
    notes.forEach(n => {
        // AUTO判定
        if(isAuto && !audio.paused) {
            if(!n.hit && n.type <= 4 && now >= n.time) {
                n.hit = true;
                playSE([1,3].includes(n.type) ? 'dong' : 'ka');
                effects.push({ t: "良", time: Date.now() });
            }
            if(now >= n.time && now < n.endTime && !n.fin) {
                const interval = 1/30;
                if(now >= n.lastA + interval) {
                    playSE('dong'); n.curH++; n.lastA = now;
                    if([7,9].includes(n.type) && n.curH >= n.req) { n.fin = true; playSE('balloon'); }
                }
            } else if(now >= n.endTime) { n.fin = true; }
        }

        // 描画
        const x = TARGET_X + (n.time - now) * (PX_PER_SEC * n.scroll);
        const xEnd = TARGET_X + (n.endTime - now) * (PX_PER_SEC * n.scroll);
        if(xEnd < -200 || x > dprW + 200 || (n.fin && [7,9].includes(n.type))) return;

        const s = SPRITES[n.type];
        if([5,6].includes(n.type)) {
            const bS = SPRITES[n.type===5?55:66], tS = SPRITES[8];
            for(let bx = x; bx < xEnd; bx += bS.w*SCALE) {
                const tw = Math.min(bS.w, (xEnd-bx)/SCALE);
                ctx.drawImage(notesImg, bS.x, 0, tw, 150, bx, Y_CENTER-75*SCALE, tw*SCALE, 150*SCALE);
            }
            ctx.drawImage(notesImg, tS.x, 0, tS.w, 150, xEnd - (tS.w*SCALE)/2, Y_CENTER-75*SCALE, tS.w*SCALE, 150*SCALE);
        }
        if(!n.hit || n.type > 4) {
            const drawX = ([7,9,5,6].includes(n.type) && now >= n.time && now < n.endTime) ? TARGET_X : x;
            ctx.drawImage(notesImg, s.x, 0, s.w, 150, drawX - (s.w*SCALE)/2, Y_CENTER-75*SCALE, s.w*SCALE, 150*SCALE);
            if([7,9].includes(n.type) && now >= n.time) {
                ctx.fillStyle="#fff"; ctx.font="bold 24px Arial"; ctx.textAlign="center";
                ctx.fillText(Math.max(0, n.req - n.curH), drawX, Y_CENTER + 60);
            }
        }
    });

    effects = effects.filter(e => {
        const age = Date.now() - e.time;
        if(age < 300) { ctx.globalAlpha = 1 - (age/300); ctx.fillStyle = "#ff0"; ctx.font = "bold 30px Arial"; ctx.textAlign = "center"; ctx.fillText(e.t, TARGET_X, Y_CENTER - 45); ctx.globalAlpha = 1; return true; }
        return false;
    });
    requestAnimationFrame(update);
}
update();

document.getElementById('play-btn').onclick = () => {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    audio.paused ? audio.play() : audio.pause();
};

document.getElementById('apply-btn').onclick = () => parseTJA(document.getElementById('tja-editor').value);

document.getElementById('speed-num').onchange = (e) => {
    playbackRate = parseFloat(e.target.value) || 1.0;
    audio.playbackRate = playbackRate;
    audio.preservesPitch = true;
};

document.getElementById('f-combined').onchange = async (e) => {
    const f = e.target.files[0]; if(!f) return;
    if(f.name.endsWith('.zip')) {
        const zip = await JSZip.loadAsync(f);
        for(let p in zip.files) {
            if(p.endsWith('.tja')) {
                const txt = new TextDecoder("shift_jis").decode(await zip.files[p].async("uint8array"));
                document.getElementById('tja-editor').value = txt; parseTJA(txt);
            }
            if(p.match(/\.(ogg|wav|mp3)$/i)) {
                audio.src = URL.createObjectURL(new Blob([await zip.files[p].async("arraybuffer")]));
            }
        }
    } else {
        const r = new FileReader(); r.onload = () => { document.getElementById('tja-editor').value = r.result; parseTJA(r.result); }; r.readAsText(f, "shift_jis");
    }
};

document.getElementById('f-audio-only').onchange = (e) => {
    if(e.target.files[0]) audio.src = URL.createObjectURL(e.target.files[0]);
};

audio.onloadedmetadata = () => { document.getElementById('seek-bar').max = audio.duration; };

document.getElementById('seek-bar').oninput = (e) => {
    audio.currentTime = parseFloat(e.target.value);
    notes.forEach(n => { n.hit = n.fin = false; n.curH = 0; n.lastA = n.time; });
};

document.getElementById('course-select').onchange = (e) => loadCourse(e.target.value);
</script>
</body>
</html>
