<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TJA Previewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
@font-face{font-family:'TF';src:url('https://cdn.jsdelivr.net/gh/shiratama-kotone/any-app@main/assets/taikofont.otf') format('opentype')}
*{font-family:'TF',sans-serif;box-sizing:border-box}
body{background:#1a1a1a;color:#fff;padding:14px;margin:0}
.container{max-width:960px;margin:0 auto;background:#2d2d2d;padding:14px;border-radius:12px}
/* 再生コントロール */
.play-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
/* 蛇腹パネル */
.acc-btn{background:#444;color:#fff;border:none;width:100%;text-align:left;padding:8px 12px;border-radius:4px;cursor:pointer;font-weight:bold;margin-bottom:4px}
.acc-panel{display:none;background:#1e1e1e;border-radius:4px;padding:10px;margin-bottom:8px}
.acc-panel.open{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
/* コントロール共通 */
.ctrl{display:flex;align-items:center;gap:5px;background:#333;padding:5px 9px;border-radius:4px;font-size:13px}
.ctrl input,.ctrl select{background:#222;color:#fff;border:1px solid #555;padding:2px 4px;border-radius:3px}
select{background:#333;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:4px}
button{background:#00b0ff;color:#fff;border:none;padding:7px 12px;border-radius:4px;cursor:pointer;font-weight:bold}
/* ゲームスクリーン */
.game-screen{width:100%;background:#000;border:3px solid #444;border-radius:8px;overflow:hidden;position:relative}
canvas{width:100%;display:block}
#status-bar{font-size:11px;color:#0f0;margin-top:5px;background:#000;padding:5px}
.branch-badge{position:absolute;top:4px;right:8px;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:4px;pointer-events:none;display:none}
.branch-badge.normal{background:#4a7;color:#fff;display:block}
.branch-badge.expert{background:#d4a;color:#fff;display:block}
.branch-badge.master{background:#a44;color:#fff;display:block}
/* 太鼓コントローラー */
#taiko-ctrl{
  width:100%;
  position:relative;
  height:130px;
  overflow:hidden;
  margin-top:8px;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}
#taiko-canvas{
  display:block;
  width:100%;
  height:100%;
}
#song-list-panel{display:none;background:#1e1e1e;border-radius:4px;padding:8px;margin-bottom:8px;max-height:180px;overflow-y:auto}
#song-list-panel.open{display:block}
.song-item{padding:5px 8px;cursor:pointer;border-radius:3px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.song-item:hover{background:#333}
.song-item button{background:#f44;padding:3px 7px;font-size:11px}
</style>
</head>
<body>
<div class="container">

  <!-- 再生コントロール -->
  <div class="play-row">
    <button id="play-btn">▶ 再生/停止</button>
    <input type="range" id="seek-bar" value="0" step="0.01" style="flex:1;min-width:60px">
    <span id="time-display" style="font-size:13px;min-width:42px">0.00</span>
  </div>

  <!-- 蛇腹: ファイル -->
  <button class="acc-btn" onclick="toggleAcc('file-panel',this)">▶ ファイル</button>
  <div class="acc-panel" id="file-panel">
    <button onclick="document.getElementById('fc').click()">📄 ZIP/TJA読込</button>
    <button onclick="document.getElementById('fa').click()">🎵 音声読込</button>
    <button id="apply-btn" style="background:#4caf50">反映(APPLY)</button>
    <textarea id="tja-editor" placeholder="TJAをここに貼り付け..." style="width:100%;height:60px;background:#000;color:#0f0;border:1px solid #555;padding:6px;margin-top:6px;resize:vertical"></textarea>
    <button id="save-btn" style="background:#f80;width:100%">💾 このZIP/TJAを保存してリストに追加</button>
    <input type="file" id="fc" accept=".tja,.zip" style="display:none">
    <input type="file" id="fa" accept="audio/*" style="display:none">
  </div>

  <!-- 蛇腹: 曲リスト -->
  <button class="acc-btn" onclick="toggleAcc('song-list-panel',this)">▶ 保存済み曲リスト</button>
  <div id="song-list-panel"></div>

  <!-- 蛇腹: 設定 -->
  <button class="acc-btn" onclick="toggleAcc('settings-panel',this)">▶ 設定</button>
  <div class="acc-panel" id="settings-panel">
    <div class="ctrl">曲速:<input type="number" id="speed-num" value="1.0" step="0.01" min="0.1" max="5.0" style="width:50px"></div>
    <div class="ctrl">ばいそく:
      <select id="lane-speed">
        <option value="1.0" selected>×1.0</option><option value="1.1">×1.1</option>
        <option value="1.2">×1.2</option><option value="1.3">×1.3</option>
        <option value="1.4">×1.4</option><option value="1.5">×1.5</option>
        <option value="1.6">×1.6</option><option value="1.7">×1.7</option>
        <option value="1.8">×1.8</option><option value="1.9">×1.9</option>
        <option value="2.0">×2.0</option><option value="2.5">×2.5</option>
        <option value="3.0">×3.0</option><option value="3.5">×3.5</option>
        <option value="4.0">×4.0</option>
      </select>
    </div>
    <div class="ctrl" id="roll-ctrl">連打速度:<input type="number" id="roll-speed" value="600" min="1" max="9999" style="width:60px">/s</div>
    <div class="ctrl">可確率:<input type="number" id="ok-prob" value="0" step="0.01" min="0" max="1" style="width:50px"></div>
    <div class="ctrl">不可確率:<input type="number" id="miss-prob" value="0" step="0.01" min="0" max="1" style="width:50px"></div>
    <select id="course-select" style="padding:5px 8px"></select>
    <label class="ctrl"><input type="checkbox" id="auto-play" checked> AUTO</label>
  </div>

  <!-- 蛇腹: オプション -->
  <button class="acc-btn" onclick="toggleAcc('opt-panel',this)">▶ オプション</button>
  <div class="acc-panel" id="opt-panel">
    <label class="ctrl"><input type="checkbox" id="opt-detar"> でたらめ(50%)</label>
    <label class="ctrl"><input type="checkbox" id="opt-kima"> きまぐれ(25%)</label>
    <label class="ctrl"><input type="checkbox" id="opt-abe"> あべこべ</label>
    <label class="ctrl"><input type="checkbox" id="opt-doron"> ドロン</label>
  </div>

  <!-- ゲーム画面 -->
  <div class="game-screen">
    <canvas id="game-canvas"></canvas>
    <div id="branch-badge" class="branch-badge"></div>
  </div>
  <div id="status-bar">READY</div>

  <!-- 太鼓コントローラー（スマホ用） -->
  <div id="taiko-ctrl">
    <canvas id="taiko-canvas"></canvas>
  </div>
</div>

<script>
// =========================================================
// 蛇腹トグル
// =========================================================
function toggleAcc(id, btn){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  btn.textContent=(open?'▼':'▶')+btn.textContent.slice(1);
}

// =========================================================
// Canvas・定数
// =========================================================
const canvas=document.getElementById('game-canvas'),ctx=canvas.getContext('2d');
const notesImg=new Image(); notesImg.src='https://raw.githubusercontent.com/shiratama-kotone/any-app/main/assets/taiko/notes.png';
const imgN=new Image(); imgN.src='https://github.com/shiratama-kotone/any-app/blob/main/assets/taiko/%E6%99%AE%E9%80%9A.png?raw=true';
const imgE=new Image(); imgE.src='https://github.com/shiratama-kotone/any-app/blob/main/assets/taiko/%E7%8E%84%E4%BA%BA.png?raw=true';
const imgM=new Image(); imgM.src='https://github.com/shiratama-kotone/any-app/blob/main/assets/taiko/%E9%81%94%E4%BA%BA.png?raw=true';

const SP={1:{x:202,w:78},2:{x:360,w:80},3:{x:495,w:128},4:{x:655,w:128},
          5:{x:838,w:82},55:{x:960,w:160},6:{x:1295,w:125},66:{x:1440,w:160},
          7:{x:1798,w:212},8:{x:1145,w:75},9:{x:2095,w:130},judge:{x:15,w:130}};
const NOTE_LABEL={1:'ドン',2:'カッ',3:'ドン',4:'カッ',5:'連打',6:'大連打',7:'風船',9:'連打'};

const TX=150,YC=60,BPX=400,SC=0.5,CH=280;
let laneSpeed=1.0, rollSpeed=600;

// =========================================================
// Audio
// =========================================================
const audio=new Audio();
let audioCtx=new(window.AudioContext||window.webkitAudioContext)();
let se={};
audioCtx.createMediaElementSource(audio).connect(audioCtx.destination);
async function initSE(){
  const base='https://raw.githubusercontent.com/shiratama-kotone/any-app/main/assets/taiko/';
  for(const[n,f]of[['dong','dong.wav'],['ka','ka.wav'],['balloon','balloon.wav'],
                    ['fullcombo','fullcombo.wav'],['dondafull','dondafullCombo.wav']]){
    try{const r=await fetch(base+f);se[n]=await audioCtx.decodeAudioData(await r.arrayBuffer());}catch(e){}
  }
  // 100〜1500の100刻みコンボ音を事前ロード
  for(let c=100;c<=1500;c+=100){
    try{
      const r=await fetch(`${base}${c}.wav`);
      se[`combo${c}`]=await audioCtx.decodeAudioData(await r.arrayBuffer());
    }catch(e){}
  }
}
initSE();
function playSE(t){if(!se[t])return;const s=audioCtx.createBufferSource();s.buffer=se[t];s.connect(audioCtx.destination);s.start(0);}

function checkComboSound(){
  const milestone=Math.floor(combo/100)*100;
  if(milestone>=100&&milestone<=1500&&milestone!==lastComboSound){
    lastComboSound=milestone;
    playSE(`combo${milestone}`);
  }
}

function checkFullCombo(){
  if(gameEnded) return;
  // 全ノートが判定済みかチェック
  const activeNotes=notes.filter(n=>n.type>=1&&n.type<=4&&isNoteActive(n));
  if(!activeNotes.length) return;
  if(activeNotes.some(n=>!n.judged)) return;
  gameEnded=true;
  if(missCount===0&&okCount===0){
    setTimeout(()=>playSE('dondafull'),500); // ドンダフルコンボ（全良）
  } else if(missCount===0){
    setTimeout(()=>playSE('fullcombo'),500); // フルコンボ（不可なし）
  }
}

// =========================================================
// Canvas setup
// =========================================================
function setupCanvas(){
  const dpr=window.devicePixelRatio||1,rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=CH*dpr; ctx.scale(dpr,dpr);
}
setupCanvas(); window.addEventListener('resize',setupCanvas);

// =========================================================
// 状態
// =========================================================
let courses={},currentCourse=null;
let notes=[],bars=[],effects=[];
let hasBranch=false,branchTimeline=[],branchEvents=[];
let totalNotes=0,goodCount=0,okCount=0,missCount=0,combo=0,maxCombo=0,score=0,gaugeVal=0;
let courseLevel=10,courseType='ONI';
let goodAdd=0,okAdd=0,missSub=0;
let rollTotalHits=0,rollCurrentHits=0,rollEndedAt=-999;
let lastComboSound=0;
let gameEnded=false;

// =========================================================
// スコア・ゲージ計算（変更：天井100万点、連打は全て100点）
// =========================================================
function calcNoteScore(c){
  // 天井スコアが100万点になるよう基本スコアを計算
  // 連打を除いた基本ノート数
  const baseNotesOnly=notes.filter(n=>n.type>=1&&n.type<=4).length;
  if(baseNotesOnly===0) return 0;
  
  // 連打は1打100点なので、基本ノートで900000点を稼ぐ
  const scorePerNote=Math.floor(900000/baseNotesOnly);
  const comboBonus=Math.floor(scorePerNote*c/10)/10;
  return scorePerNote+comboBonus;
}

function calcGaugeRate(type,level,nNotes){
  let okMul=0.5,missMul=1.6;
  if(type==='ONI'||type==='URA'){okMul=0.5;missMul=level<=7?1.6:2.0;}
  else if(type==='HARD'){okMul=0.75;missMul=level<=2?0.75:level===3?1.0:level===4?1.17:1.25;}
  else if(type==='NORMAL'){okMul=0.75;missMul=level<=4?0.75:1.0;}
  else{okMul=0.75;missMul=0.5;}
  const g=1.0/Math.max(1,nNotes);
  return{goodAdd:g,okMul,missMul};
}

// =========================================================
// オプション適用
// =========================================================
function applyOptions(noteList){
  const det=document.getElementById('opt-detar').checked;
  const kima=document.getElementById('opt-kima').checked;
  const abe=document.getElementById('opt-abe').checked;
  noteList.forEach(n=>{
    if(n.type>4){n.dispType=n.type;return;}
    let t=n.type;
    const flip=t=>{const isDon=[1,3].includes(t);return isDon?(t===1?2:4):(t===2?1:3);};
    if(abe) t=flip(t);
    if(det&&Math.random()<0.5) t=flip(t);
    if(kima&&Math.random()<0.25) t=flip(t);
    n.dispType=t;
  });
}

// =========================================================
// BRANCHSTART条件解析
// =========================================================
function parseBranchCond(line){
  const m=line.replace(/\s/g,'').match(/#BRANCHSTART([PRpr]),([-\d.]+),([-\d.]+)/i);
  if(!m) return{forced:null,noExpert:false,btype:'P'};
  const btype=m[1].toUpperCase(),condE=parseFloat(m[2]),condM=parseFloat(m[3]);
  let forced=null;
  if(condM<=0) forced='M';
  else if(condE<=0&&condM>100) forced='E';
  else if(condE>=100&&condM>=100) forced='N';
  const noExpert=(condE===condM)&&!forced;
  return{btype,condE,condM,forced,noExpert};
}

// =========================================================
// エンコーディング自動判定
// =========================================================
function decodeBuf(buf){
  const tryUtf8=new TextDecoder('utf-8',{fatal:false}).decode(buf);
  if(!tryUtf8.includes('\uFFFD')) return tryUtf8;
  try{return new TextDecoder('shift_jis').decode(buf);}catch(e){}
  try{return new TextDecoder('euc-jp').decode(buf);}catch(e){}
  return tryUtf8;
}

// =========================================================
// パーサー
// =========================================================
function parseTJA(text){
  courses={};
  text=text.replace(/^\uFEFF/,'');
  let gBpm=120,gOff=0;
  const lines=text.replace(/\r/g,'').split('\n');
  for(const l of lines){
    const u=l.trim().toUpperCase();
    if(u.startsWith('BPM:')) gBpm=parseFloat(l.split(':')[1])||120;
    if(u.startsWith('OFFSET:')) gOff=parseFloat(l.split(':')[1])||0;
  }
  let cur=null;
  for(const l of lines){
    const clean=l.split('//')[0].trim(),u=clean.toUpperCase();
    if(u.startsWith('COURSE:')){
      const newCur=clean.split(':')[1].trim().toUpperCase();
      if(newCur===cur) continue;
      cur=newCur;
      if(!courses[cur]) courses[cur]={lines:[],bpm:gBpm,offset:gOff,level:5,scoreInit:0,scoreDiff:0};
    }
    if(cur){
      if(u.startsWith('LEVEL:')) courses[cur].level=parseInt(clean.split(':')[1])||5;
      if(u.startsWith('SCOREINIT:')) courses[cur].scoreInit=parseInt(clean.split(':')[1])||0;
      if(u.startsWith('SCOREDIFF:')) courses[cur].scoreDiff=parseInt(clean.split(':')[1])||0;
      courses[cur].lines.push(clean);
    }
  }
  const sel=document.getElementById('course-select');
  sel.innerHTML=Object.keys(courses).map(k=>`<option>${k}</option>`).join('');
  loadCourse(Object.keys(courses)[0]);
}

// =========================================================
// コースロード
// =========================================================
function loadCourse(label){
  const c=courses[label]; if(!c) return;
  currentCourse=c;
  notes=[]; bars=[]; effects=[]; branchTimeline=[]; branchEvents=[];
  totalNotes=0; goodCount=0; okCount=0; missCount=0;
  combo=0; maxCombo=0; score=0; gaugeVal=0;
  rollTotalHits=0; rollCurrentHits=0; rollEndedAt=-999;
  lastComboSound=0; gameEnded=false;

  const cl=label.toUpperCase();
  if(cl.includes('ONI')||cl.includes('URA')) courseType='ONI';
  else if(cl.includes('HARD')||cl==='3') courseType='HARD';
  else if(cl.includes('NORMAL')||cl==='2') courseType='NORMAL';
  else courseType='EASY';
  courseLevel=c.level||5;

  const lines=c.lines;
  hasBranch=lines.some(l=>l.toUpperCase().trim().startsWith('#BRANCHSTART'));

  let balloonsFull=[];
  for(const l of lines){
    if(l.toUpperCase().trim().startsWith('BALLOON:')){
      balloonsFull=l.split(':')[1].trim().split(',').map(v=>parseInt(v)||5); break;
    }
  }
  let balloonIdx=0;

  branchEvents=[];
  const flatLines=[];
  let bi=0, levelHoldActive=false, bId=0;

  while(bi<lines.length){
    const l=lines[bi], u=l.toUpperCase().trim();
    if(u==='#LEVELHOLD'){levelHoldActive=true; bi++; continue;}

    if(u.startsWith('#BRANCHSTART')){
      const cond=parseBranchCond(l);
      const myId=bId++;
      bi++;

      const sections={N:[],E:[],M:[]};
      let curSec=null, mSeen=false;
      while(bi<lines.length){
        const bu=lines[bi].toUpperCase().trim();
        if(bu==='#N'){curSec='N'; bi++; continue;}
        if(bu==='#E'){curSec='E'; bi++; continue;}
        if(bu==='#M'){if(mSeen){bi++;continue;} mSeen=true; curSec='M'; bi++; continue;}
        if(bu.startsWith('#BRANCHEND')||bu.startsWith('#BRANCHSTART')) break;
        if(curSec) sections[curSec].push(lines[bi]);
        bi++;
      }
      const hasBranchEnd=bi<lines.length&&lines[bi].toUpperCase().trim().startsWith('#BRANCHEND');
      if(hasBranchEnd) bi++;

      flatLines.push({_bStart:true, id:myId, cond, hasBranchEnd, levelHold:levelHoldActive});

      for(const sec of ['N','E','M']){
        if(!sections[sec].length) continue;
        flatLines.push({_secStart:true, id:myId, branch:sec});
        sections[sec].forEach(bl=>flatLines.push({line:bl, branchId:myId, branch:sec}));
        flatLines.push({_secEnd:true, id:myId, branch:sec});
      }

      flatLines.push({_bEnd:true, id:myId, hasBranchEnd});
    } else {
      flatLines.push({line:l, branchId:null, branch:null});
      bi++;
    }
  }

  let bpm=c.bpm, scroll=1.0, measure=1.0;
  let curTime=0, started=false, barlineOn=true;
  let rollStack=[], noteBufChunks=[], currentChunk=null;
  let measureStartBpm=c.bpm, measureStartMeasure=1.0;
  let curBranchId=null, curBranch=null;

  function getOrNew(){
    if(currentChunk&&currentChunk.scroll===scroll&&currentChunk.bpm===bpm) return currentChunk;
    currentChunk={data:'',scroll,bpm}; noteBufChunks.push(currentChunk); return currentChunk;
  }
  function flush(){
    const mDur=(60/measureStartBpm)*4*measureStartMeasure;
    const totalLen=noteBufChunks.reduce((s,c)=>s+c.data.length,0);
    let pos=0;
    for(const chunk of noteBufChunks){
      for(let i=0;i<chunk.data.length;i++){
        const type=parseInt(chunk.data[i]);
        const t=curTime+mDur*(pos/Math.max(1,totalLen));
        if(type>=1&&type<=9&&type!==8){
          const req=[7,9].includes(type)?(balloonsFull[balloonIdx++]||5):0;
          notes.push({
            time:t, type, dispType:type, scroll:chunk.scroll, bpm:chunk.bpm,
            hit:false, fin:false, endTime:t, endScroll:null, endBpm:null,
            req, curH:0, lastA:t, judged:null,
            branchId:curBranchId, branch:curBranch,
          });
          if([5,6,7,9].includes(type)) rollStack.push(notes[notes.length-1]);
          if(type>=1&&type<=4&&curBranchId===null) totalNotes++;
        } else if(type===8){
          rollStack.forEach(r=>{r.endTime=t;r.endScroll=chunk.scroll;r.endBpm=chunk.bpm;});
          rollStack=[];
        }
        pos++;
      }
    }
    if(barlineOn) bars.push({time:curTime+mDur, scroll, bpm, branchStart:false, branchId:curBranchId, branch:curBranch});
    curTime+=mDur; noteBufChunks=[]; currentChunk=null;
    measureStartBpm=bpm; measureStartMeasure=measure;
  }

  for(const item of flatLines){
    if(typeof item !== 'object'||!item) continue;

    if(item._bStart){
      if(noteBufChunks.some(c=>c.data.length>0)) flush();
      rollStack=[];
      if(bars.length>0) bars[bars.length-1].branchStart=true;
      item._snap={curTime,bpm,scroll,measure,measureStartBpm,measureStartMeasure};
      branchEvents.push({id:item.id, time:curTime, cond:item.cond,
                         hasBranchEnd:item.hasBranchEnd, levelHold:item.levelHold,
                         activeBranch:null});
      branchTimeline.push({id:item.id, branch:'N', startTime:curTime, endTime:Infinity});
      continue;
    }
    if(item._secStart){
      if(noteBufChunks.some(c=>c.data.length>0)) flush();
      rollStack=[];
      const snap=flatLines.find(f=>f._bStart&&f.id===item.id)?._snap;
      if(snap){curTime=snap.curTime;bpm=snap.bpm;scroll=snap.scroll;measure=snap.measure;measureStartBpm=snap.measureStartBpm;measureStartMeasure=snap.measureStartMeasure;}
      curBranchId=item.id; curBranch=item.branch;
      continue;
    }
    if(item._secEnd){
      if(noteBufChunks.some(c=>c.data.length>0)) flush();
      rollStack=[];
      const ev=branchEvents.find(e=>e.id===item.id);
      if(ev) ev._secEndTimes=(ev._secEndTimes||{}), ev._secEndTimes[item.branch]=curTime;
      curBranchId=null; curBranch=null;
      continue;
    }
    if(item._bEnd){
      if(noteBufChunks.some(c=>c.data.length>0)) flush();
      const ev=branchEvents.find(e=>e.id===item.id);
      if(ev){
        const times=Object.values(ev._secEndTimes||{});
        if(times.length) curTime=Math.max(...times);
        const bt=branchTimeline.find(b=>b.id===ev.id);
        if(bt) bt.endTime=curTime;
        if(item.hasBranchEnd){
          branchTimeline.push({id:-1, branch:'N', startTime:curTime, endTime:Infinity});
        }
      }
      continue;
    }

    const l=item.line, u=l.toUpperCase().trim();
    if(u==='#START'){started=true;continue;}
    if(u==='#END'){started=false;noteBufChunks=[];currentChunk=null;continue;}
    if(!started) continue;
    if(u.startsWith('#')){
      const parts=l.trim().split(/\s+/), cmd=parts[0].toUpperCase();
      if(cmd==='#BPMCHANGE'){bpm=parseFloat(parts[1])||bpm;currentChunk=null;if(!noteBufChunks.some(c=>c.data.length>0))measureStartBpm=bpm;}
      if(cmd==='#SCROLL'){scroll=parseFloat(parts[1])||scroll;currentChunk=null;}
      if(cmd==='#MEASURE'){const m=parts[1]?.split('/');if(m?.[1]){measure=parseFloat(m[0])/parseFloat(m[1]);if(!noteBufChunks.some(c=>c.data.length>0))measureStartMeasure=measure;}}
      if(u==='#BARLINEOFF') barlineOn=false;
      if(u==='#BARLINEON') barlineOn=true;
      continue;
    }
    if(/[0-9,]/.test(l)){
      const segs=l.split(',');
      for(let si=0;si<segs.length;si++){
        const seg=segs[si].replace(/\s+/g,'');
        if(si<segs.length-1){if(seg.length>0)getOrNew().data+=seg;flush();}
        else if(seg.length>0) getOrNew().data+=seg;
      }
    }
  }
  if(noteBufChunks.some(c=>c.data.length>0)) flush();

  applyOptions(notes);
  const gr=calcGaugeRate(courseType,courseLevel,Math.max(1,totalNotes));
  goodAdd=gr.goodAdd; okAdd=gr.goodAdd*gr.okMul; missSub=gr.goodAdd*gr.missMul;

  if(!hasBranch) document.getElementById('branch-badge').className='branch-badge';
  document.getElementById('status-bar').textContent=
    `Notes:${totalNotes}+ BPM:${c.bpm} Course:${courseType} Lv:${courseLevel} Branch:${hasBranch?'あり':'なし'}`;
}

// =========================================================
// 分岐判定
// =========================================================
let branchSectionStats={};

function resetBranchStats(){
  branchSectionStats={};
}

function updateBranchDecision(now){
  for(const ev of branchEvents){
    if(ev.activeBranch!==null) continue;
    if(now < ev.time) continue;

    const myIdx=branchEvents.indexOf(ev);
    const prevEndTime= myIdx>0
      ? branchTimeline.find(b=>b.id===branchEvents[myIdx-1].id)?.endTime ?? 0
      : 0;

    const windowNotes=notes.filter(n=>{
      if(n.type>4) return false;
      if(n.time < prevEndTime || n.time >= ev.time) return false;
      if(n.branchId===null) return true;
      const prevEv=myIdx>0?branchEvents[myIdx-1]:null;
      if(prevEv&&n.branchId===prevEv.id&&n.branch===prevEv.activeBranch) return true;
      return false;
    });

    const windowRolls=notes.filter(n=>{
      if(![5,6].includes(n.type)) return false;
      if(n.time < prevEndTime || n.time >= ev.time) return false;
      if(n.branchId===null) return true;
      const prevEv=myIdx>0?branchEvents[myIdx-1]:null;
      if(prevEv&&n.branchId===prevEv.id&&n.branch===prevEv.activeBranch) return true;
      return false;
    });

    const wGood=windowNotes.filter(n=>n.judged==='good').length;
    const wOk=windowNotes.filter(n=>n.judged==='ok').length;
    const wTotal=windowNotes.length;
    const wRolls=windowRolls.reduce((s,n)=>s+n.curH,0);

    const cond=ev.cond;
    let pick='N';

    if(cond.forced){
      pick=cond.forced;
    } else if(ev.levelHold){
      const prevEv=myIdx>0?branchEvents[myIdx-1]:null;
      pick=prevEv?.activeBranch??'N';
    } else if(cond.btype==='P'){
      const accuracy= wTotal>0 ? (wGood*100+wOk*50)/(wTotal*100)*100 : 100;
      if(accuracy>=cond.condM) pick='M';
      else if(accuracy>=cond.condE) pick='E';
      else pick='N';
    } else {
      if(wRolls>=cond.condM) pick='M';
      else if(wRolls>=cond.condE) pick='E';
      else pick='N';
    }

    if(cond.noExpert && pick==='E') pick='M';

    const order=cond.noExpert?(pick==='N'?['N','M']:['M','N']):(pick==='N'?['N','E','M']:['M','E','N']);
    const available=['N','E','M'].filter(p=>notes.some(n=>n.branchId===ev.id&&n.branch===p));
    let chosen='N';
    for(const p of order){if(available.includes(p)||p===pick){chosen=p;break;}}
    if(!available.length) chosen=pick;

    ev.activeBranch=chosen;

    const bt=branchTimeline.find(b=>b.id===ev.id);
    if(bt) bt.branch=chosen;

    const addNotes=notes.filter(n=>n.branchId===ev.id&&n.branch===chosen&&n.type>=1&&n.type<=4).length;
    totalNotes+=addNotes;
    const gr=calcGaugeRate(courseType,courseLevel,Math.max(1,totalNotes));
    goodAdd=gr.goodAdd; okAdd=gr.goodAdd*gr.okMul; missSub=gr.goodAdd*gr.missMul;
  }
}

function isNoteActive(n){
  if(n.branchId===null) return true;
  const ev=branchEvents.find(e=>e.id===n.branchId);
  if(!ev) return false;
  if(ev.activeBranch===null){
    return n.branch==='N';
  }
  return n.branch===ev.activeBranch;
}

function isBarActive(b){
  if(b.branchId===null) return true;
  const ev=branchEvents.find(e=>e.id===b.branchId);
  if(!ev) return false;
  if(ev.activeBranch===null) return b.branch==='N';
  return b.branch===ev.activeBranch;
}

// =========================================================
// 保存済み曲リスト (IndexedDB)
// =========================================================
let db=null;
const DB_NAME='TJAPreviewer',DB_VER=1,STORE='songs';

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=rej;
  });
}
async function dbGetAll(){
  const tx=db.transaction(STORE,'readonly'),st=tx.objectStore(STORE);
  return new Promise((res,rej)=>{const req=st.getAll();req.onsuccess=()=>res(req.result);req.onerror=rej;});
}
async function dbAdd(item){
  const tx=db.transaction(STORE,'readwrite'),st=tx.objectStore(STORE);
  return new Promise((res,rej)=>{const req=st.add(item);req.onsuccess=()=>res(req.result);req.onerror=rej;});
}
async function dbDel(id){
  const tx=db.transaction(STORE,'readwrite'),st=tx.objectStore(STORE);
  return new Promise((res,rej)=>{const req=st.delete(id);req.onsuccess=res;req.onerror=rej;});
}

let pendingSave={tjaText:'',audioData:null,audioType:'',filename:''};

async function renderSongList(){
  const panel=document.getElementById('song-list-panel');
  const songs=await dbGetAll();
  if(!songs.length){panel.innerHTML='<div style="color:#888;padding:8px">保存済みの曲はありません</div>';return;}
  panel.innerHTML=songs.map(s=>`
    <div class="song-item" id="sl-${s.id}">
      <span onclick="loadSavedSong(${s.id})" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.filename}</span>
      <button onclick="deleteSavedSong(${s.id})">削除</button>
    </div>`).join('');
}

async function loadSavedSong(id){
  const songs=await dbGetAll();
  const s=songs.find(x=>x.id===id); if(!s) return;
  document.getElementById('tja-editor').value=s.tjaText;
  parseTJA(s.tjaText);
  if(s.audioData){
    const blob=new Blob([s.audioData],{type:s.audioType||'audio/ogg'});
    audio.src=URL.createObjectURL(blob);
  }
}

async function deleteSavedSong(id){
  await dbDel(id); renderSongList();
}

};

// =========================================================
// ノルマゲージ (50本ランプ、上部に移動)
// =========================================================
function drawNormaGauge(W){
  const LAMP_N=50,GH=20,GAP=2;
  const GX=TX-10,GW=W-GX-12,GY=5;
  const lampW=(GW-(LAMP_N-1)*GAP)/LAMP_N;
  ctx.fillStyle='#111'; ctx.fillRect(GX-2,GY-2,GW+14,GH+16);

  const clPct={ONI:0.596,HARD:0.50,NORMAL:0.50,EASY:0.44}[courseType]??0.55;
  const clLamp=Math.round(clPct*LAMP_N);
  const litN=Math.min(LAMP_N,Math.round(gaugeVal*LAMP_N));

  for(let i=0;i<LAMP_N;i++){
    const lx=GX+i*(lampW+GAP);
    let color='#2a2a2a';
    if(i<litN){
      if(i<clLamp){
        const t=i/Math.max(1,clLamp-1);
        color=`rgb(255,${Math.round(80+t*80)},0)`;
      } else {
        const t=(i-clLamp)/Math.max(1,LAMP_N-clLamp-1);
        color=`rgb(${Math.round(255-t*100)},255,${Math.round(t*60)})`;
      }
    }
    ctx.fillStyle=color; ctx.fillRect(lx,GY,lampW,GH);
    if(i===clLamp-1){
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(lx+lampW+GAP/2,GY-3); ctx.lineTo(lx+lampW+GAP/2,GY+GH+3); ctx.stroke();
    }
  }

  ctx.font='9px TF,sans-serif'; ctx.textBaseline='top'; ctx.textAlign='center';
  const clX=GX+(clLamp-1)*(lampW+GAP)+lampW+GAP/2;
  ctx.fillStyle='#ccc'; ctx.fillText('CL',clX,GY+GH+2);
}

function drawScore(W){

  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.font='bold 20px TF,sans-serif'; ctx.fillStyle='#fff';
  ctx.fillText(String(score).padStart(8,'0'),W-10,30);

  // コンボ（左上）
  if(combo>0){
    ctx.font='bold 36px TF,sans-serif'; ctx.fillStyle='#ff0'; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(`${combo}`,5,30);
    ctx.font='9px TF,sans-serif'; ctx.fillStyle='#ff0';
    ctx.fillText('コンボ',5,68);
  }

  // その他スタッツ
  const hitRate=totalNotes>0?Math.round((totalNotes-missCount)/totalNotes*100):100;
  ctx.font='12px TF,sans-serif'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#0f0'; ctx.fillText(`良:${goodCount}`,5,80);
  ctx.fillStyle='#ff0'; ctx.fillText(`可:${okCount}`,5,95);
  ctx.fillStyle='#f44'; ctx.fillText(`不可:${missCount}`,5,110);
  ctx.fillStyle='#0ff'; ctx.fillText(`叩:${hitRate}%`,5,125);
  if(rollTotalHits>0){
    ctx.fillStyle='#0ff'; ctx.fillText(`連打:${rollTotalHits}`,5,140);
  }
  const rollAge=(audio.currentTime+( currentCourse?.offset??0))-rollEndedAt;
  if(rollCurrentHits>0&&rollAge<1.0){
    ctx.globalAlpha=rollAge<0.7?1:1-(rollAge-0.7)/0.3;
    ctx.fillStyle='#ff0'; ctx.font='bold 14px TF,sans-serif';
    ctx.fillText(`↑${rollCurrentHits}打`,5,155);
    ctx.globalAlpha=1;
  }
}

// =========================================================
// メインループ
// =========================================================
function update(){
  const dpr=window.devicePixelRatio||1,W=canvas.width/dpr;
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,CH);
  if(!currentCourse){requestAnimationFrame(update);return;}

  const now=audio.currentTime+currentCourse.offset;
  document.getElementById('time-display').textContent=audio.currentTime.toFixed(2);
  if(!isNaN(audio.duration)) document.getElementById('seek-bar').value=audio.currentTime;

  updateBranchDecision(now);

  ctx.fillStyle='#000'; ctx.fillRect(0,YC-44,W,88);

  if(hasBranch){
    let ab=branchTimeline[0]?.branch??'N';
    for(const b of branchTimeline) if(now>=b.startTime) ab=b.branch;
    const img=ab==='M'?imgM:ab==='E'?imgE:imgN;
    const badge=document.getElementById('branch-badge');
    const map={N:['normal','普通'],E:['expert','玄人'],M:['master','達人']};
    const[cls,lbl]=map[ab]??['normal','普通'];
    badge.className='branch-badge '+cls; badge.textContent=lbl;
    if(img.complete&&img.naturalWidth>0){
      const ih=88,iw=img.naturalWidth*(ih/img.naturalHeight);
      ctx.globalAlpha=0.35; ctx.drawImage(img,W/2-iw/2,YC-44,iw,ih); ctx.globalAlpha=1;
    }
  }

  bars.forEach(b=>{
    if(!isBarActive(b)) return;
    const x=TX+(b.time-now)*BPX*b.scroll*(b.bpm/currentCourse.bpm)*laneSpeed;
    if(x>0&&x<W){
      ctx.strokeStyle=b.branchStart?'#ff0':'#444'; ctx.lineWidth=b.branchStart?3:2;
      ctx.beginPath(); ctx.moveTo(x,YC-44); ctx.lineTo(x,YC+44); ctx.stroke();
    }
  });

  const sj=SP.judge;
  ctx.drawImage(notesImg,sj.x,0,sj.w,150,TX-(sj.w*SC)/2,YC-75*SC,sj.w*SC,150*SC);

  const isAuto=document.getElementById('auto-play').checked;
  const doron=document.getElementById('opt-doron').checked;
  const okProb=parseFloat(document.getElementById('ok-prob').value)||0;
  const missProb=parseFloat(document.getElementById('miss-prob').value)||0;

  if(!isAuto){
    for(const n of notes){
      if(!isNoteActive(n)) continue;
      if(n.judged||n.type>4) continue;
      if(now>n.time+0.108){
        n.hit=true;
        const rand=Math.random();
        if(rand<missProb){
          n.judged='miss'; missCount++;
          combo=0;
          gaugeVal=Math.max(0,gaugeVal-missSub);
          effects.push({t:'不可',time:Date.now(),color:'#f44'});
        } else if(rand<missProb+okProb){
          n.judged='ok'; okCount++;
          combo++;
          if(combo>maxCombo)maxCombo=combo;
          const okScore=Math.floor(calcNoteScore(combo-1)*0.5);
          score+=okScore;
          gaugeVal=Math.min(1,gaugeVal+okAdd);
          checkComboSound();
          effects.push({t:'可',time:Date.now(),color:'#ff0'});
        } else {
          n.judged='good'; goodCount++;
          combo++;
          if(combo>maxCombo)maxCombo=combo;
          score+=calcNoteScore(combo-1);
          gaugeVal=Math.min(1,gaugeVal+goodAdd);
          checkComboSound();
          effects.push({t:'良',time:Date.now(),color:'#0f0'});
        }
      }
    }
  }

  notes.forEach(n=>{
    if(!isNoteActive(n)) return;
    const pps=BPX*n.scroll*(n.bpm/currentCourse.bpm)*laneSpeed;
    const endPps=n.endScroll!=null?BPX*n.endScroll*(n.endBpm/currentCourse.bpm)*laneSpeed:pps;
    const x=TX+(n.time-now)*pps;
    const xEnd=TX+(n.endTime-now)*endPps;

    if(isAuto&&!audio.paused){
      if(!n.hit&&n.type<=4&&now>=n.time){
        n.hit=true;
        const rand=Math.random();
        if(rand<missProb){
          n.judged='miss'; missCount++;
          combo=0;
          gaugeVal=Math.max(0,gaugeVal-missSub);
          effects.push({t:'不可',time:Date.now(),color:'#f44'});
        } else if(rand<missProb+okProb){
          n.judged='ok'; okCount++;
          playSE([1,3].includes(n.dispType)?'dong':'ka');
          combo++;
          if(combo>maxCombo)maxCombo=combo;
          const okScore=Math.floor(calcNoteScore(combo-1)*0.5);
          score+=okScore;
          gaugeVal=Math.min(1,gaugeVal+okAdd);
          checkComboSound();
          effects.push({t:'可',time:Date.now(),color:'#ff0'});
        } else {
          n.judged='good';
          playSE([1,3].includes(n.dispType)?'dong':'ka');
          goodCount++; combo++; if(combo>maxCombo)maxCombo=combo;
          score+=calcNoteScore(combo-1);
          gaugeVal=Math.min(1,gaugeVal+goodAdd);
          checkComboSound();
          effects.push({t:'良',time:Date.now(),color:'#0f0'});
        }
        checkFullCombo();
      }
      if([5,6,7,9].includes(n.type)&&now>=n.time&&now<n.endTime&&!n.fin){
        const interval=1/rollSpeed;
        if(now>=n.lastA+interval){
          const hits=Math.floor((now-n.lastA)/interval);
          for(let h=0;h<hits;h++){
            playSE('dong'); n.curH++;
            if([5,6].includes(n.type)){rollTotalHits++;rollCurrentHits++; score+=100;}
            if([7,9].includes(n.type)&&n.curH>=n.req){n.fin=true;playSE('balloon');rollEndedAt=now;break;}
          }
          n.lastA+=hits*interval;
        }
      } else if([5,6].includes(n.type)&&now>=n.endTime&&!n.fin){
        n.fin=true; rollEndedAt=now;
      }
    }

    if(xEnd<-200||x>W+200) return;
    if(n.fin&&[7,9].includes(n.type)) return;
    const s=SP[n.dispType]||SP[n.type]; if(!s) return;

    if([5,6].includes(n.type)){
      const bS=SP[n.type===5?55:66],tS=SP[8];
      for(let bx=Math.max(x,-bS.w*SC);bx<xEnd;bx+=bS.w*SC){
        const tw=Math.min(bS.w,(xEnd-bx)/SC);
        ctx.drawImage(notesImg,bS.x,0,tw,150,bx,YC-75*SC,tw*SC,150*SC);
      }
      ctx.drawImage(notesImg,tS.x,0,tS.w,150,xEnd-(tS.w*SC)/2,YC-75*SC,tS.w*SC,150*SC);
    }
    if(!n.hit||n.type>4){
      const isHeld=[5,6,7,9].includes(n.type)&&now>=n.time&&now<n.endTime;
      const dx=isHeld?TX:x;
      if(!doron) ctx.drawImage(notesImg,s.x,0,s.w,150,dx-(s.w*SC)/2,YC-75*SC,s.w*SC,150*SC);
      const lbl=NOTE_LABEL[n.dispType]||NOTE_LABEL[n.type]||'';
      if(lbl){
        const isDon=[1,3].includes(n.dispType??n.type);
        ctx.font='bold 12px TF,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
        ctx.fillStyle=isDon?'#f84':'#4af';
        ctx.fillText(lbl,dx,YC+44);
      }
      if([7,9].includes(n.type)&&now>=n.time){
        ctx.fillStyle='#fff'; ctx.font='bold 22px TF,sans-serif'; ctx.textAlign='center';
        ctx.textBaseline='middle'; ctx.fillText(Math.max(0,n.req-n.curH),dx,YC+30);
      }
    }
  });

  effects=effects.filter(e=>{
    const age=Date.now()-e.time;
    if(age<300){
      ctx.globalAlpha=1-age/300;
      ctx.fillStyle=e.color||'#ff0'; ctx.font='bold 26px TF,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e.t,TX,YC); ctx.globalAlpha=1; return true;
    }
    return false;
  });

  const rollAge=now-rollEndedAt;
  if(rollAge>=1.0&&rollCurrentHits>0) rollCurrentHits=0;

  drawNormaGauge(W);
  drawScore(W);
  requestAnimationFrame(update);
}
update();

// =========================================================
// 手動判定
// =========================================================
function judgeHit(isDon){
  if(document.getElementById('auto-play').checked||audio.paused) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  const now=audio.currentTime+(currentCourse?.offset??0);
  playSE(isDon?'dong':'ka');
  for(const n of notes){
    if(!isNoteActive(n)) continue;
    if(n.fin) continue;
    if([5,6,7,9].includes(n.type)&&now>=n.time&&now<n.endTime){
      if(!isDon) return;
      n.curH++; rollTotalHits++; rollCurrentHits++; score+=100;
      if([7,9].includes(n.type)&&n.curH>=n.req){n.fin=true;playSE('balloon');rollEndedAt=now;}
      return;
    }
  }
  const isOni=courseType==='ONI';
  const GW=isOni?0.025025:0.041708,OW=isOni?0.075075:0.108442;
  let best=null,bestDist=OW;
  for(const n of notes){
    if(!isNoteActive(n)) continue;
    if(n.judged||n.type>4) continue;
    const dist=Math.abs(n.time-now);
    if(dist<bestDist){
      const needDon=[1,3].includes(n.dispType??n.type);
      if(isDon===needDon){best=n;bestDist=dist;}
    }
  }
  if(!best) return;
  best.hit=true;
  const okProb=parseFloat(document.getElementById('ok-prob').value)||0;
  const missProb=parseFloat(document.getElementById('miss-prob').value)||0;
  if(bestDist<=GW){
    const rand=Math.random();
    if(rand<missProb){
      best.judged='miss'; missCount++;
      combo=0;
      gaugeVal=Math.max(0,gaugeVal-missSub);
      effects.push({t:'不可',time:Date.now(),color:'#f44'});
    } else if(rand<missProb+okProb){
      best.judged='ok'; okCount++;
      combo++;
      if(combo>maxCombo)maxCombo=combo;
      const okScore=Math.floor(calcNoteScore(combo-1)*0.5);
      score+=okScore;
      gaugeVal=Math.min(1,gaugeVal+okAdd);
      checkComboSound();
      effects.push({t:'可',time:Date.now(),color:'#ff0'});
    } else {
      best.judged='good'; goodCount++; combo++; if(combo>maxCombo)maxCombo=combo;
      score+=calcNoteScore(combo-1);
      gaugeVal=Math.min(1,gaugeVal+goodAdd);
      checkComboSound();
      effects.push({t:'良',time:Date.now(),color:'#0f0'});
    }
  } else {
    best.judged='miss'; missCount++;
    combo=0;
    gaugeVal=Math.max(0,gaugeVal-missSub);
    effects.push({t:'不可',time:Date.now(),color:'#f44'});
  }
  checkFullCombo();
}

};

document.getElementById('fa').onchange=async(e)=>{
  const file=e.target.files[0]; if(!file) return;
  audio.src=URL.createObjectURL(file);
  pendingSave.audioData=await file.arrayBuffer();
  pendingSave.audioType=file.type;
};

document.getElementById('apply-btn').onclick=()=>{
  const tjaText=document.getElementById('tja-editor').value;
  if(!tjaText.trim()){alert('TJAテキストが空です');return;}
  pendingSave.tjaText=tjaText;
  parseTJA(tjaText);
};

document.getElementById('play-btn').onclick=()=>{
  if(audio.paused) audio.play();
  else audio.pause();
};

document.getElementById('seek-bar').oninput=(e)=>{
  audio.currentTime=parseFloat(e.target.value);
};

document.getElementById('speed-num').onchange=(e)=>{
  audio.playbackRate=parseFloat(e.target.value);
};

document.getElementById('lane-speed').onchange=(e)=>{
  laneSpeed=parseFloat(e.target.value);
};

document.getElementById('roll-speed').onchange=(e)=>{
  rollSpeed=parseInt(e.target.value);
};

document.getElementById('course-select').onchange=(e)=>{
  loadCourse(e.target.value);
};

// キーボード操作（スマホは画面タップで対応）
document.addEventListener('keydown',(e)=>{
  if(e.key==='z'||e.key==='Z') judgeHit(true); // ドン
  if(e.key==='x'||e.key==='X') judgeHit(false); // カッ
});

// スマホ対応タッチ操作
const taikoCanvas=document.getElementById('taiko-canvas');
const taikoCtx=taikoCanvas.getContext('2d');

function setupTaikoCanvas(){
  const dpr=window.devicePixelRatio||1,rect=taikoCanvas.parentElement.getBoundingClientRect();
  taikoCanvas.width=rect.width*dpr; taikoCanvas.height=130*dpr; taikoCtx.scale(dpr,dpr);
}
setupTaikoCanvas(); window.addEventListener('resize',setupTaikoCanvas);

function drawTaikoController(){
  const W=taikoCanvas.width/(window.devicePixelRatio||1),H=130;
  taikoCtx.fillStyle='#222'; taikoCtx.fillRect(0,0,W,H);
  
  // ドン（左）
  taikoCtx.fillStyle='#f44'; taikoCtx.beginPath(); taikoCtx.arc(W*0.25,H/2,40,0,Math.PI*2); taikoCtx.fill();
  taikoCtx.fillStyle='#fff'; taikoCtx.font='bold 24px TF'; taikoCtx.textAlign='center'; taikoCtx.textBaseline='middle';
  taikoCtx.fillText('ドン',W*0.25,H/2);
  
  // カッ（右）
  taikoCtx.fillStyle='#44f'; taikoCtx.beginPath(); taikoCtx.arc(W*0.75,H/2,40,0,Math.PI*2); taikoCtx.fill();
  taikoCtx.fillStyle='#fff'; taikoCtx.fillText('カッ',W*0.75,H/2);
}

let touchX={};
taikoCanvas.addEventListener('touchstart',(e)=>{
  for(const t of e.touches){
    const W=taikoCanvas.width/(window.devicePixelRatio||1);
    touchX[t.identifier]=t.clientX-taikoCanvas.getBoundingClientRect().left;
    if(touchX[t.identifier]<W/2) judgeHit(true);
    else judgeHit(false);
  }
});

taikoCanvas.addEventListener('touchend',(e)=>{
  for(const t of e.changedTouches) delete touchX[t.identifier];
});

setInterval(()=>drawTaikoController(),100);
drawTaikoController();

</script>
</body>
</html>
