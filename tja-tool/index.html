<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJA改造ツール</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<h2>🔥 最強TJA改造ツール</h2>

<input type="file" id="file"><br>

<textarea id="input" placeholder="ここにTJAが表示される"></textarea>

<h3>密度</h3>
倍率 <input id="rate" value="10">

<h3>HS変換（0で無効）</h3>
Easy <input id="easy" value="0">
Normal <input id="normal" value="0">
Hard <input id="hard" value="0">
Oni <input id="oni" value="0">
Edit <input id="edit" value="0">

<h3>ノーツ変換</h3>
<select id="mode">
<option value="none">そのまま</option>
<option value="don">全てドン</option>
<option value="ka">全てカッ</option>
<option value="bigdon">全て大ドン</option>
<option value="bigka">全て大カッ</option>
<option value="balloon">全てくすだま</option>
</select>

<label><input type="checkbox" id="keepRoll" checked>連打そのまま</label>

<br>
<button onclick="convert()">変換</button>

<h3>結果</h3>
<textarea id="output"></textarea>
<button onclick="download()">ダウンロード</button>

<script>
var originalZip=null, originalName="";

// 文字コード自動
function decodeAuto(data){
    var utf8=new TextDecoder("utf-8").decode(data);
    if((utf8.match(/�/g)||[]).length<3) return utf8;
    return new TextDecoder("shift_jis").decode(data);
}

// 読み込み
file.onchange=async e=>{
    var f=e.target.files[0];
    if(!f)return;
    originalName=f.name;

    if(f.name.endsWith(".zip")){
        originalZip=await JSZip.loadAsync(f);
        originalZip.forEach(async(p,en)=>{
            if(p.endsWith(".tja")){
                var d=await en.async("uint8array");
                input.value=decodeAuto(d);
            }
        });
    }else{
        originalZip=null;
        var r=new FileReader();
        r.onload=()=>input.value=r.result;
        r.readAsText(f);
    }
};

// ノーツ変換
function transform(line,rate,mode,keep){
    return line.replace(/[0-9]/g,c=>{
        if(keep && "5678".includes(c)) return c.repeat(rate);
        var n=c;
        if(mode==="don")n="1";
        if(mode==="ka")n="2";
        if(mode==="bigdon")n="3";
        if(mode==="bigka")n="4";
        if(mode==="balloon")n="9";
        return n.repeat(rate);
    });
}

// 本体
function process(text){
    var lines=text.split("\n");
    var rate=parseInt(document.getElementById("rate").value)||1;

    var diff={
        Easy:parseFloat(document.getElementById("easy").value)||0,
        Normal:parseFloat(document.getElementById("normal").value)||0,
        Hard:parseFloat(document.getElementById("hard").value)||0,
        Oni:parseFloat(document.getElementById("oni").value)||0,
        Edit:parseFloat(document.getElementById("edit").value)||0
    };

    var mode=document.getElementById("mode").value;
    var keepRoll=document.getElementById("keepRoll").checked;

    var cur=null,measure=0,inScore=false;

    for(var i=0;i<lines.length;i++){
        var l=lines[i];

        if(l.startsWith("TITLE:")){
            lines[i]=l+" ("+rate+"倍)";
        }

        if(l.startsWith("COURSE:")){
            cur=l.split(":")[1].trim();
            measure=0;
        }

        if(l.startsWith("#START")){inScore=true;measure=0;}
        if(l.startsWith("#END")) inScore=false;

        if(inScore && !l.startsWith("#")){
            measure++;

            if(diff[cur]!==0){
                var hs=1+diff[cur]*measure;
                lines.splice(i,0,"#SCROLL "+hs);
                i++;
            }

            lines[i]=transform(l,rate,mode,keepRoll);
        }
    }
    return lines.join("\n");
}

function convert(){
    output.value=process(input.value);
}

async function download(){
    var rate=parseInt(document.getElementById("rate").value)||1;

    if(originalZip){
        var newZip=new JSZip();

        await Promise.all(Object.keys(originalZip.files).map(async p=>{
            var e=originalZip.files[p];
            var data=await e.async("uint8array");

            if(p.endsWith(".tja")){
                var txt=decodeAuto(data);
                newZip.file(p,process(txt));
            }else{
                newZip.file(p,data);
            }
        }));

        var blob=await newZip.generateAsync({type:"blob"});
        var a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download=originalName.replace(".zip"," ("+rate+"倍).zip");
        a.click();

    }else{
        var blob=new Blob([output.value]);
        var a=document.createElement("a");
        a.href=URL.createObjectURL(blob);
        a.download=originalName.replace(".tja"," ("+rate+"倍).tja");
        a.click();
    }
}
</script>

</body>
</html>
