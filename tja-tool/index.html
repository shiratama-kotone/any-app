<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJA改造ツール</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
</head>
<body>

<h2>🔥 TJA改造ツール</h2>

<input type="file" id="file" accept=".tja,.zip"><br>
<textarea id="input" placeholder="ここにTJAの内容が表示されます"></textarea>

<div class="settings">
    <h3>密度</h3>
    倍率 <input type="number" id="rate" value="10" min="1">

    <h3>HS変換（0で無効 / 密度と重複OK）</h3>
    Easy <input type="number" id="easy" step="0.1" value="0">
    Normal <input type="number" id="normal" step="0.1" value="0">
    Hard <input type="number" id="hard" step="0.1" value="0">
    Oni <input type="number" id="oni" step="0.1" value="0">
    Edit <input type="number" id="edit" step="0.1" value="0">

    <h3>連打系変換（5,6,7,9のみに適用）</h3>
    <select id="mode">
        <option value="none">そのまま</option>
        <option value="5">全て連打(小)</option>
        <option value="6">全て連打(大)</option>
        <option value="7">全てふうせん</option>
        <option value="9">全てくすだま</option>
    </select>
    <label><input type="checkbox" id="keepRoll" checked>連打も倍増させる</label>
</div>

<br>
<button onclick="convert()">変換</button>

<h3>結果</h3>
<textarea id="output" readonly></textarea>
<button onclick="download()">ダウンロード</button>

<script>
let originalZip = null;
let originalName = "";
let detectedEncoding = "UTF8";

function autoDecode(uint8Array) {
    const method = Encoding.detect(uint8Array);
    detectedEncoding = method; 
    const unicodeArray = Encoding.convert(uint8Array, { to: 'UNICODE', from: method });
    return Encoding.codeToString(unicodeArray);
}

function encodeToOriginal(str) {
    const unicodeArray = Encoding.stringToCode(str);
    const result = Encoding.convert(unicodeArray, { to: detectedEncoding, from: 'UNICODE' });
    return new Uint8Array(result);
}

document.getElementById("file").addEventListener("change", async e => {
    const f = e.target.files[0];
    if (!f) return;
    originalName = f.name;

    if (f.name.endsWith(".zip")) {
        try {
            originalZip = await JSZip.loadAsync(f);
            for (const path in originalZip.files) {
                if (path.toLowerCase().endsWith(".tja")) {
                    const data = await originalZip.files[path].async("uint8array");
                    document.getElementById("input").value = autoDecode(data);
                    break;
                }
            }
        } catch (err) {
            alert("ZIP読み込み失敗");
        }
    } else {
        originalZip = null;
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById("input").value = autoDecode(new Uint8Array(ev.target.result));
        };
        reader.readAsArrayBuffer(f);
    }
});

function transformLine(line, rate, mode, keepRoll) {
    return line.split(',').map(part => {
        let newPart = "";
        for (let i = 0; i < part.length; i++) {
            let c = part[i];
            if (c === "0") {
                newPart += "0".repeat(rate);
            } else if ("1234".includes(c)) {
                newPart += c + "0".repeat(rate - 1);
            } else if ("5679".includes(c)) {
                let target = (mode !== "none") ? mode : c;
                newPart += keepRoll ? target.repeat(rate) : (target + "0".repeat(rate - 1));
            } else if (c === "8") {
                newPart += keepRoll ? "8".repeat(rate) : ("8" + "0".repeat(rate - 1));
            } else {
                newPart += c;
            }
        }
        return newPart;
    }).join(',');
}

function processTJA(text) {
    const lines = text.split(/\r?\n/);
    const rate = parseInt(document.getElementById("rate").value) || 1;
    const mode = document.getElementById("mode").value;
    const keepRoll = document.getElementById("keepRoll").checked;

    const diffSettings = {
        easy: parseFloat(document.getElementById("easy").value) || 0,
        normal: parseFloat(document.getElementById("normal").value) || 0,
        hard: parseFloat(document.getElementById("hard").value) || 0,
        oni: parseFloat(document.getElementById("oni").value) || 0,
        edit: parseFloat(document.getElementById("edit").value) || 0
    };

    let curCourse = "";
    let measure = 0;
    let inScore = false;
    const newLines = [];

    for (let line of lines) {
        let trimmed = line.trim();

        if (trimmed.startsWith("BALLOON:")) {
            const bParts = trimmed.split(":");
            if (bParts[1]) {
                const counts = bParts[1].split(",").map(v => {
                    let n = parseInt(v.trim());
                    return isNaN(n) ? v : Math.floor(n * rate);
                });
                newLines.push("BALLOON:" + counts.join(","));
                continue;
            }
        }

        if (trimmed.startsWith("TITLE:")) {
            newLines.push(trimmed + " (" + rate + "倍)");
            continue;
        }

        if (trimmed.startsWith("COURSE:")) {
            const cName = trimmed.split(":")[1].trim().toLowerCase();
            const map = {"0":"easy", "1":"normal", "2":"hard", "3":"oni", "4":"edit"};
            curCourse = map[cName] || cName;
            measure = 0;
            newLines.push(line);
            continue;
        }

        if (trimmed.startsWith("#START")) { inScore = true; measure = 0; newLines.push(line); continue; }
        if (trimmed.startsWith("#END")) { inScore = false; newLines.push(line); continue; }

        if (inScore && trimmed && !trimmed.startsWith("#")) {
            measure++;
            // HS加速がある場合は、ノーツ変換の直前に #SCROLL を挿入
            if (diffSettings[curCourse] && diffSettings[curCourse] !== 0) {
                const hsVal = (1 + (diffSettings[curCourse] * measure)).toFixed(2);
                newLines.push("#SCROLL " + hsVal);
            }
            // 密度変換（◯倍）を適用
            newLines.push(transformLine(line, rate, mode, keepRoll));
        } else {
            newLines.push(line);
        }
    }
    return newLines.join("\n");
}

function convert() {
    const src = document.getElementById("input").value;
    if (!src) return alert("入力なし");
    document.getElementById("output").value = processTJA(src);
}

async function download() {
    const res = document.getElementById("output").value;
    if (!res) return alert("変換なし");
    const rate = document.getElementById("rate").value;

    if (originalZip) {
        const newZip = new JSZip();
        for (const path in originalZip.files) {
            const entry = originalZip.files[path];
            if (entry.dir) continue;
            if (path.toLowerCase().endsWith(".tja")) {
                newZip.file(path, encodeToOriginal(res));
            } else {
                newZip.file(path, await entry.async("uint8array"));
            }
        }
        const blob = await newZip.generateAsync({type: "blob"});
        save(blob, originalName.replace(".zip", ` (${rate}倍).zip`));
    } else {
        save(new Blob([encodeToOriginal(res)]), originalName.replace(".tja", ` (${rate}倍).tja`));
    }
}

function save(blob, name) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
}
</script>
</body>
</html>
