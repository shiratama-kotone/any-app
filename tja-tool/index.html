<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJA改造ツール</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
</head>
<body>

<h2>🔥 TJA改造ツール</h2>

<input type="file" id="file" accept=".tja,.zip"><br>
<textarea id="input" placeholder="ここにTJAの内容が表示されます"></textarea>

<h3>密度</h3>
倍率 <input type="number" id="rate" value="10" min="1">

<h3>HS変換（0で無効）</h3>
Easy <input type="number" id="easy" step="0.1" value="0">
Normal <input type="number" id="normal" step="0.1" value="0">
Hard <input type="number" id="hard" step="0.1" value="0">
Oni <input type="number" id="oni" step="0.1" value="0">
Edit <input type="number" id="edit" step="0.1" value="0">

<h3>ノーツ変換</h3>
<select id="mode">
    <option value="none">そのまま</option>
    <option value="1">全てドン</option>
    <option value="2">全てカッ</option>
    <option value="3">全て大ドン</option>
    <option value="4">全て大カッ</option>
    <option value="9">全てくすだま</option>
</select>

<label><input type="checkbox" id="keepRoll" checked>連打も倍増させる</label>

<br>
<button onclick="convert()">変換</button>

<h3>結果</h3>
<textarea id="output" readonly></textarea>
<button onclick="download()">ダウンロード</button>

<script>
let originalZip = null;
let originalName = "";
let detectedEncoding = "utf-8";

// 文字コード判別（Shift_JISかUTF-8か）
function decodeAuto(data) {
    const sjis = new TextDecoder("shift_jis").decode(data);
    // TJA特有のキーワードが含まれているかで判定
    if (sjis.includes("TITLE") || sjis.includes("COURSE") || sjis.includes("#START")) {
        detectedEncoding = "shift_jis";
        return sjis;
    }
    detectedEncoding = "utf-8";
    return new TextDecoder("utf-8").decode(data);
}

function encodeByDetected(str) {
    if (detectedEncoding === "shift_jis") {
        const u = Encoding.stringToCode(str);
        const s = Encoding.convert(u, "SJIS", "UNICODE");
        return new Uint8Array(s);
    }
    return new TextEncoder().encode(str);
}

// ファイル読み込み処理
document.getElementById("file").addEventListener("change", async e => {
    const f = e.target.files[0];
    if (!f) return;
    originalName = f.name;

    if (f.name.endsWith(".zip")) {
        try {
            originalZip = await JSZip.loadAsync(f);
            let tjaFound = false;
            // ZIP内をループして最初のTJAを探す
            for (const path of Object.keys(originalZip.files)) {
                if (path.toLowerCase().endsWith(".tja")) {
                    const data = await originalZip.files[path].async("uint8array");
                    document.getElementById("input").value = decodeAuto(data);
                    tjaFound = true;
                    break;
                }
            }
            if (!tjaFound) alert("ZIP内に.tjaファイルが見つかりません。");
        } catch (err) {
            console.error(err);
            alert("ZIPの読み込みに失敗しました。");
        }
    } else {
        originalZip = null;
        const buffer = await f.arrayBuffer();
        document.getElementById("input").value = decodeAuto(new Uint8Array(buffer));
    }
});

function transform(line, rate, mode, keepRoll) {
    return line.split(',').map(part => {
        return part.replace(/[0-9]/g, c => {
            if (c === "0") return "0".repeat(rate);
            if ("5678".includes(c) && !keepRoll) return c;
            let n = (mode !== "none") ? mode : c;
            return n.repeat(rate);
        });
    }).join(',');
}

function processTJA(text) {
    const lines = text.split(/\r?\n/);
    const rate = parseInt(document.getElementById("rate").value) || 1;
    const mode = document.getElementById("mode").value;
    const keepRoll = document.getElementById("keepRoll").checked;

    const diffSettings = {
        easy: parseFloat(document.getElementById("easy").value) || 0,
        normal: parseFloat(document.getElementById("normal").value) || 0,
        hard: parseFloat(document.getElementById("hard").value) || 0,
        oni: parseFloat(document.getElementById("oni").value) || 0,
        edit: parseFloat(document.getElementById("edit").value) || 0
    };

    let curCourse = "";
    let measure = 0;
    let inScore = false;
    const newLines = [];

    for (let line of lines) {
        let trimmed = line.trim();

        if (trimmed.startsWith("TITLE:")) {
            newLines.push(trimmed + " (" + rate + "倍)");
            continue;
        }
        if (trimmed.startsWith("COURSE:")) {
            const c = trimmed.split(":")[1].trim().toLowerCase();
            const map = {"0":"easy", "1":"normal", "2":"hard", "3":"oni", "4":"edit"};
            curCourse = map[c] || c;
            measure = 0;
            newLines.push(line);
            continue;
        }
        if (trimmed.startsWith("#START")) { inScore = true; measure = 0; newLines.push(line); continue; }
        if (trimmed.startsWith("#END")) { inScore = false; newLines.push(line); continue; }

        if (inScore && trimmed && !trimmed.startsWith("#")) {
            measure++;
            if (diffSettings[curCourse] && diffSettings[curCourse] !== 0) {
                newLines.push("#SCROLL " + (1 + (diffSettings[curCourse] * measure)).toFixed(2));
            }
            newLines.push(transform(line, rate, mode, keepRoll));
        } else {
            newLines.push(line);
        }
    }
    return newLines.join("\n");
}

function convert() {
    const val = document.getElementById("input").value;
    if (!val) return alert("データがありません");
    document.getElementById("output").value = processTJA(val);
}

async function download() {
    const out = document.getElementById("output").value;
    if (!out) return alert("変換を先にしてください");
    const rate = document.getElementById("rate").value;

    if (originalZip) {
        const newZip = new JSZip();
        // 既存ファイルをすべてコピー、TJAだけ差し替え
        const filePaths = Object.keys(originalZip.files);
        for (const path of filePaths) {
            const entry = originalZip.files[path];
            if (entry.dir) continue;

            if (path.toLowerCase().endsWith(".tja")) {
                newZip.file(path, encodeByDetected(out));
            } else {
                const data = await entry.async("uint8array");
                newZip.file(path, data);
            }
        }
        const blob = await newZip.generateAsync({type: "blob"});
        triggerDownload(blob, originalName.replace(".zip", ` (${rate}倍).zip`));
    } else {
        const blob = new Blob([encodeByDetected(out)]);
        triggerDownload(blob, originalName.replace(".tja", ` (${rate}倍).tja`));
    }
}

function triggerDownload(blob, filename) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}
</script>
</body>
</html>
