<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TJA改造ツール</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 200px; margin: 10px 0; font-family: monospace; }
        .settings { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="number"] { width: 80px; }
        button { padding: 10px 20px; cursor: pointer; background: #d32f2f; color: white; border: none; border-radius: 4px; font-weight: bold; }
        .download-btn { background: #1976d2; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
</head>
<body>

<h2>🔥 TJA改造ツール</h2>

<div class="settings">
    <input type="file" id="file" accept=".tja,.zip"><br><br>
    繰り返し倍数: <input type="number" id="rate" value="10" min="1">
    
    <h3>HS変換 (0で無効)</h3>
    Easy: <input type="number" id="easy" step="0.1" value="0">
    Normal: <input type="number" id="normal" step="0.1" value="0">
    Hard: <input type="number" id="hard" step="0.1" value="0">
    Oni: <input type="number" id="oni" step="0.1" value="0">
    Edit: <input type="number" id="edit" step="0.1" value="0">

    <h3>連打変換</h3>
    <select id="mode">
        <option value="none">そのまま</option>
        <option value="5">連打(小)</option>
        <option value="6">連打(大)</option>
        <option value="7">ふうせん</option>
        <option value="9">くすだま</option>
    </select>
</div>

<textarea id="input" placeholder="TJAを読み込んでください"></textarea>
<button onclick="convert()">変換実行</button>

<hr>
<textarea id="output" readonly></textarea>
<button class="download-btn" onclick="download()">ダウンロード</button>

<script>
let originalZip = null;
let originalName = "";
let detectedEncoding = "UTF8";

function autoDecode(uint8Array) {
    const method = Encoding.detect(uint8Array);
    detectedEncoding = method; 
    return Encoding.codeToString(Encoding.convert(uint8Array, { to: 'UNICODE', from: method }));
}

function encodeToOriginal(str) {
    return new Uint8Array(Encoding.convert(Encoding.stringToCode(str), { to: detectedEncoding, from: 'UNICODE' }));
}

document.getElementById("file").addEventListener("change", async e => {
    const f = e.target.files[0];
    if (!f) return;
    originalName = f.name;
    if (f.name.endsWith(".zip")) {
        originalZip = await JSZip.loadAsync(f);
        for (const path in originalZip.files) {
            if (path.toLowerCase().endsWith(".tja")) {
                document.getElementById("input").value = autoDecode(await originalZip.files[path].async("uint8array"));
                break;
            }
        }
    } else {
        originalZip = null;
        const reader = new FileReader();
        reader.onload = (ev) => document.getElementById("input").value = autoDecode(new Uint8Array(ev.target.result));
        reader.readAsArrayBuffer(f);
    }
});

function repeatChars(str, rate, mode) {
    if (rate <= 1) return str;
    let res = "";
    for (let i = 0; i < str.length; i++) {
        let c = str[i];
        if ("0123456789".includes(c)) {
            let target = (mode !== "none" && "5679".includes(c)) ? mode : c;
            res += target.repeat(rate);
        } else {
            res += c;
        }
    }
    return res;
}

function countNotes(text) {
    let count = 0;
    let inScore = false;
    text.split('\n').forEach(line => {
        let t = line.trim();
        if (t.startsWith("#START")) inScore = true;
        else if (t.startsWith("#END")) inScore = false;
        else if (inScore && !t.startsWith("#")) {
            count += (t.match(/[1-4]/g) || []).length;
        }
    });
    return count;
}

function processTJA(text) {
    const lines = text.split(/\r?\n/);
    const rate = Math.max(1, parseInt(document.getElementById("rate").value) || 1);
    const mode = document.getElementById("mode").value;
    const diffSettings = { easy:0, normal:0, hard:0, oni:0, edit:0 };
    ["easy","normal","hard","oni","edit"].forEach(d => {
        diffSettings[d] = parseFloat(document.getElementById(d).value) || 0;
    });

    let title = "", subtitle = "", currentCourseData = null;
    let courses = [];
    const headerLines = [];

    // TITLEJA等の整理
    for (let line of lines) {
        let t = line.trim();
        if (t.startsWith("TITLE:")) { if(!title) title = t.split(":")[1].trim(); continue; }
        if (t.startsWith("TITLEJA:")) { title = t.split(":")[1].trim(); continue; }
        if (t.startsWith("SUBTITLE:")) { if(!subtitle) subtitle = t.split(":")[1].trim(); continue; }
        if (t.startsWith("SUBTITLEJA:")) { subtitle = t.split(":")[1].trim(); continue; }
        
        if (t.startsWith("COURSE:")) {
            if (currentCourseData) courses.push(currentCourseData);
            currentCourseData = { name: t.split(":")[1].trim().toLowerCase(), content: [] };
        }
        if (currentCourseData) {
            // 倍率変更時のみスコアタグを除去して再計算対象にする
            if (rate > 1 && (t.startsWith("SCOREINIT:") || t.startsWith("SCOREDIFF:"))) continue;
            currentCourseData.content.push(line);
        } else {
            headerLines.push(line);
        }
    }
    if (currentCourseData) courses.push(currentCourseData);

    // タイトル構築
    let finalTJA = `TITLE:${title}${rate > 1 ? ` (${rate}倍)` : ""}\n`;
    if (subtitle) finalTJA += `SUBTITLE:${subtitle}\n`;
    finalTJA += headerLines.join("\n") + "\n";

    courses.forEach(course => {
        let measure = 0;
        let scoreIn = false;
        const map = {"0":"easy", "1":"normal", "2":"hard", "3":"oni", "4":"edit"};
        let diffKey = map[course.name] || course.name;

        let processedLines = course.content.map(line => {
            let t = line.trim();
            if (t.startsWith("BALLOON:") && rate > 1) {
                const bVal = t.split(":")[1];
                return bVal ? "BALLOON:" + bVal.split(",").map(v => Math.floor((parseInt(v.trim()) || 0) * rate)).join(",") : line;
            }
            if (t.startsWith("#START")) { scoreIn = true; measure = 0; return line; }
            if (t.startsWith("#END")) { scoreIn = false; return line; }
            if (scoreIn && !t.startsWith("#")) {
                const parts = line.split(",");
                return parts.map((part, idx) => {
                    let out = "";
                    if (part.trim() && idx < parts.length - 1) {
                        measure++;
                        if (diffSettings[diffKey] !== 0) {
                            out += `#SCROLL ${(1 + (diffSettings[diffKey] * measure)).toFixed(2)}\n`;
                        }
                    }
                    out += repeatChars(part, rate, mode);
                    return out;
                }).join(",");
            }
            return line;
        }).join("\n");

        finalTJA += `COURSE:${course.name}\n`;
        
        // 倍率が1より大きい時のみ点数を固定
        if (rate > 1) {
            let totalCombo = countNotes(processedLines);
            let targetScore = (diffKey === "easy" || diffKey === "normal") ? 114514 : 114514810;
            let scoreInit = totalCombo > 0 ? Math.floor(targetScore / totalCombo) : 100;
            finalTJA += `SCOREINIT:${scoreInit}\n`;
            finalTJA += `SCOREDIFF:0\n`;
        }

        finalTJA += processedLines + "\n";
    });

    return finalTJA;
}

function convert() {
    const src = document.getElementById("input").value;
    if (!src) return alert("入力なし");
    document.getElementById("output").value = processTJA(src);
}

async function download() {
    const res = document.getElementById("output").value;
    if (!res) return;
    const rate = document.getElementById("rate").value;
    if (originalZip) {
        const newZip = new JSZip();
        for (const path in originalZip.files) {
            if (path.toLowerCase().endsWith(".tja")) {
                newZip.file(path, encodeToOriginal(res));
            } else if (!originalZip.files[path].dir) {
                newZip.file(path, await originalZip.files[path].async("uint8array"));
            }
        }
        save(await newZip.generateAsync({type: "blob"}), originalName.replace(".zip", ` (${rate}倍).zip`));
    } else {
        save(new Blob([encodeToOriginal(res)]), originalName.replace(".tja", ` (${rate}倍).tja`));
    }
}

function save(blob, name) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
}
</script>
</body>
</html>
